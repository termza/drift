name: audio_listen
description: A clean, modern audio player for iOS and Windows with synced progress.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Playback
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13
  just_audio_media_kit: ^2.0.6
  media_kit_libs_audio: ^1.0.4
  audio_session: ^0.1.21

  # File access + metadata
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  audio_metadata_reader: ^1.4.0

  # Local storage
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3+1
  shared_preferences: ^2.3.2

  # State management
  flutter_riverpod: ^2.5.1

  # Sync backend
  pocketbase: ^0.21.0
  http: ^1.2.2

  # Desktop window chrome
  window_manager: ^0.4.3

  # Spotify-style artwork color extraction
  palette_generator: ^0.3.3+5

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utils
  uuid: ^4.5.1
  collection: ^1.18.0
  path: ^1.9.0
  rxdart: ^0.27.7

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/brand_vinyl.png"
  ios: true
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "assets/brand_vinyl.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/
